spring.application.name=API-GATEWAY
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


spring.cloud.gateway.routes[0].id=MOVIE-SERVICE
spring.cloud.gateway.routes[0].uri=lb://MOVIE-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path= /movie/**
spring.cloud.gateway.routes[0].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[1].id=WATCHLIST-SERVICE
spring.cloud.gateway.routes[1].uri=lb://WATCHLIST-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path= /watchlist/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=JOURNAL-SERVICE
spring.cloud.gateway.routes[2].uri=lb://JOURNAL-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path= /journals/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=USER-SERVICE
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path= /users/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=AUTHENTICATION-SERVICE
spring.cloud.gateway.routes[4].uri=lb://AUTHENTICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[4].filters[0]=AddRequestHeader=Authorization, Bearer ${token}





springdoc.swagger-ui.urls[0].name=USER-SERVICE
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=MOVIE-SERVICE
springdoc.swagger-ui.urls[1].url=/movie-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=JOURNAL-SERVICE
springdoc.swagger-ui.urls[2].url=/journal-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=WATCHLIST-SERVICE
springdoc.swagger-ui.urls[3].url=/watchlist-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=AUTHENTICATION-SERVICE
springdoc.swagger-ui.urls[4].url=/authentication-service/v3/api-docs

# Proxy for MOVIE-SERVICE Swagger
spring.cloud.gateway.routes[5].id=MOVIE-SERVICE-SWAGGER
spring.cloud.gateway.routes[5].uri=lb://MOVIE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/movie-service/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# Proxy for USER-SERVICE Swagger
spring.cloud.gateway.routes[6].id=USER-SERVICE-SWAGGER
spring.cloud.gateway.routes[6].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# Proxy for JOURNAL-SERVICE Swagger
spring.cloud.gateway.routes[7].id=JOURNAL-SERVICE-SWAGGER
spring.cloud.gateway.routes[7].uri=lb://JOURNAL-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/journal-service/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[8].id=WATCHLIST-SERVICE-SWAGGER
spring.cloud.gateway.routes[8].uri=lb://WATCHLIST-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/watchlist-service/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[9].id=AUTHENTICATION-SERVICE-SWAGGER
spring.cloud.gateway.routes[9].uri=lb://AUTHENTICATION-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/authentication-service/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=1


spring.cloud.gateway.routes[10].id=COMPANION-SERVICE
spring.cloud.gateway.routes[10].uri=lb://COMPANION-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path= /friend/**
spring.cloud.gateway.routes[10].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[11].id=CHAT-SERVICE
spring.cloud.gateway.routes[11].uri=lb://CHAT-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path= /**
spring.cloud.gateway.routes[11].filters[0]=AuthenticationFilter
