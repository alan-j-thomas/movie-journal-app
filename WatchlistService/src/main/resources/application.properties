spring.application.name=WATCHLIST-SERVICE

server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/watchlist?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=alan0101@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

resilience4j.ratelimiter.instances.watchlistRateLimiter.limit-refresh-period=10s
resilience4j.ratelimiter.instances.watchlistRateLimiter.limit-for-period=2
resilience4j.ratelimiter.instances.watchlistRateLimiter.timeout-duration=1s


management.endpoints.web.exposure.include= *
management.endpoint.health.show-details=always 
management.tracing.sampling.probability=1.0

