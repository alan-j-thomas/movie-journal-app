# Spring Application
spring.application.name=USER-SERVICE

# Datasource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/userinfo2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=alan0101@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Client Configuration
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Server Port
server.port=8081

# Management and Health Endpoints
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.usersCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.usersCircuitBreaker.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.usersCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.usersCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.usersCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.usersCircuitBreaker.wait-duration-in-open-state=6s
resilience4j.circuitbreaker.instances.usersCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.usersCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.usersCircuitBreaker.sliding-window-type=COUNT_BASED