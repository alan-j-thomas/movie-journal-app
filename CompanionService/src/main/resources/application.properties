spring.application.name=companion-service
server.port=8085

spring.datasource.url=jdbc:mysql://companion-db:3306/companion_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka

rabbitmq.queue.name=notification-queue
rabbitmq.exchange.name=app-exchange
rabbitmq.routing.key=notification-key
